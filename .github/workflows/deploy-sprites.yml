name: Deploy — sprites.dev

on:
  repository_dispatch:
    types: [test-deploy-command]
  workflow_dispatch:
    inputs:
      minutes:
        description: "Lifetime in minutes (1–60)"
        required: false
        default: "10"

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.client_payload.slash_command.args.unnamed.arg1 == 'sprites'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve params
        id: params
        env:
          INPUT_MINUTES: ${{ github.event.client_payload.slash_command.args.unnamed.arg2 || inputs.minutes || '10' }}
          INPUT_PR_NUMBER: ${{ github.event.client_payload.pull_request.number }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        run: |
          RAW="$(printf '%d' "${INPUT_MINUTES}" 2>/dev/null)"
          RAW="${RAW:-10}"
          MINUTES=$(( RAW < 1 ? 1 : RAW > 60 ? 60 : RAW ))
          echo "minutes=$MINUTES" >> "$GITHUB_OUTPUT"

          PR_NUMBER="$(printf '%d' "${INPUT_PR_NUMBER}" 2>/dev/null)"
          [[ "$PR_NUMBER" == "0" ]] && PR_NUMBER=""
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          echo "sprite_name=backend-${GH_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GH_REPOSITORY}:${GH_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Install sprite CLI
        run: curl -fsSL https://sprites.dev/install.sh | sh

      - name: Authenticate with sprites.dev
        env:
          SPRITES_TOKEN: ${{ secrets.SPRITES_TOKEN }}
        run: sprite auth setup --token "$SPRITES_TOKEN"

      - name: Create and configure sprite
        id: sprite
        env:
          SPRITE_NAME: ${{ steps.params.outputs.sprite_name }}
        run: |
          sprite create --skip-console "$SPRITE_NAME"
          sprite use "$SPRITE_NAME"
          sprite url update --auth public
          URL=$(sprite url)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Bootstrap Docker inside sprite
        env:
          DEPLOY_IMAGE: ${{ steps.params.outputs.image }}
        run: |
          sed "s|__IMAGE__|${DEPLOY_IMAGE}|g" \
            deploy/sprites/entrypoint.sh > /tmp/entrypoint-rendered.sh
          sprite exec -- bash -s < /tmp/entrypoint-rendered.sh

      - name: Wait for backend to be healthy
        env:
          SPRITE_URL: ${{ steps.sprite.outputs.url }}
        run: |
          for _ in $(seq 1 30); do
            if curl -sf "${SPRITE_URL}/health"; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Backend did not become healthy in time" >&2
          exit 1

      - name: Post live URL comment
        if: steps.params.outputs.pr_number != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          token: ${{ secrets.REPO_TOKEN }}
          issue-number: ${{ steps.params.outputs.pr_number }}
          body: |
            **temp-backend-pipeline** (sprites.dev) is live for ${{ steps.params.outputs.minutes }} min

            Base URL: `${{ steps.sprite.outputs.url }}`

            | Method | Path | Action |
            |--------|------|--------|
            | GET | `/health` | Health check |
            | POST | `/contacts` | Create contact |
            | GET | `/contacts` | List contacts |
            | GET | `/contacts/:id` | Get contact |
            | PUT | `/contacts/:id` | Update contact |
            | DELETE | `/contacts/:id` | Delete contact |

            The sprite will be destroyed automatically after ${{ steps.params.outputs.minutes }} min.

      - name: Wait for lifetime to expire
        env:
          DEPLOY_MINUTES: ${{ steps.params.outputs.minutes }}
        run: sleep $(( DEPLOY_MINUTES * 60 ))

      - name: Destroy sprite
        if: always() && steps.params.outputs.sprite_name != ''
        env:
          SPRITE_NAME: ${{ steps.params.outputs.sprite_name }}
        run: sprite destroy "$SPRITE_NAME" --force || true

      - name: Post teardown comment
        if: always() && steps.params.outputs.pr_number != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          token: ${{ secrets.REPO_TOKEN }}
          issue-number: ${{ steps.params.outputs.pr_number }}
          body: "Sprite `${{ steps.params.outputs.sprite_name }}` destroyed. Session ended."
