name: Deploy — AWS EC2 Spot

on:
  repository_dispatch:
    types: [test-deploy-command]
  workflow_dispatch:
    inputs:
      minutes:
        description: "Lifetime in minutes (1–60)"
        required: false
        default: "10"

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.client_payload.slash_command.args.unnamed.arg1 == 'aws'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      id-token: write # required for OIDC role assumption

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.client_payload.pull_request.head.sha || github.sha }}

      - name: Resolve params
        id: params
        env:
          INPUT_MINUTES: ${{ github.event.client_payload.slash_command.args.unnamed.arg2 || inputs.minutes || '10' }}
          INPUT_PR_NUMBER: ${{ github.event.client_payload.pull_request.number }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_SHA: ${{ github.event.client_payload.pull_request.head.sha || github.sha }}
        run: |
          RAW="$(printf '%d' "${INPUT_MINUTES}" 2>/dev/null)"
          RAW="${RAW:-10}"
          MINUTES=$(( RAW < 1 ? 1 : RAW > 60 ? 60 : RAW ))
          echo "minutes=$MINUTES" >> "$GITHUB_OUTPUT"

          PR_NUMBER="$(printf '%d' "${INPUT_PR_NUMBER}" 2>/dev/null)"
          [[ "$PR_NUMBER" == "0" ]] && PR_NUMBER=""
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          echo "image=ghcr.io/${GH_REPOSITORY}:${GH_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and push image (multi-arch)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository }}:${{ github.event.client_payload.pull_request.head.sha || github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve latest Amazon Linux 2023 ARM64 AMI
        id: ami
        run: |
          AMI=$(aws ec2 describe-images \
            --owners amazon \
            --filters \
              "Name=name,Values=al2023-ami-*-arm64" \
              "Name=state,Values=available" \
            --query "sort_by(Images, &CreationDate)[-1].ImageId" \
            --output text)
          echo "id=$AMI" >> "$GITHUB_OUTPUT"

      - name: Create ephemeral security group
        id: sg
        env:
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          SG_ID=$(aws ec2 create-security-group \
            --group-name "temp-backend-${GH_RUN_ID}" \
            --description "Temp backend run ${GH_RUN_ID}" \
            --query GroupId --output text)
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp --port 80 --cidr 0.0.0.0/0
          echo "id=$SG_ID" >> "$GITHUB_OUTPUT"

      - name: Render user-data with runtime values
        env:
          DEPLOY_MINUTES: ${{ steps.params.outputs.minutes }}
          DEPLOY_IMAGE: ${{ steps.params.outputs.image }}
        run: |
          sed \
            -e "s|__MINUTES__|${DEPLOY_MINUTES}|g" \
            -e "s|__IMAGE__|${DEPLOY_IMAGE}|g" \
            deploy/spot/user-data.sh > /tmp/user-data-rendered.sh

      - name: Launch spot instance
        id: instance
        env:
          AMI_ID: ${{ steps.ami.outputs.id }}
          SG_ID: ${{ steps.sg.outputs.id }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --instance-type t4g.nano \
            --image-id "$AMI_ID" \
            --instance-market-options '{"MarketType":"spot"}' \
            --instance-initiated-shutdown-behavior terminate \
            --security-group-ids "$SG_ID" \
            --user-data "file:///tmp/user-data-rendered.sh" \
            --tag-specifications \
              "ResourceType=instance,Tags=[{Key=temp-backend,Value=true},{Key=run-id,Value=${GH_RUN_ID}}]" \
            --count 1 \
            --query "Instances[0].InstanceId" \
            --output text)
          echo "id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for instance to be running
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
        run: aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"

      - name: Get public IP
        id: ip
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "address=$IP" >> "$GITHUB_OUTPUT"

      - name: Wait for backend to be healthy
        env:
          BACKEND_IP: ${{ steps.ip.outputs.address }}
        run: |
          for _ in $(seq 1 40); do
            if curl -sf "http://${BACKEND_IP}/health"; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become healthy in time" >&2
          exit 1

      - name: Post live URL comment
        if: steps.params.outputs.pr_number != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ steps.params.outputs.pr_number }}
          body: |
            **temp-backend-pipeline** (AWS Spot `t4g.nano`, `${{ env.AWS_REGION }}`) is live for ${{ steps.params.outputs.minutes }} min

            Base URL: `http://${{ steps.ip.outputs.address }}`

            | Method | Path | Action |
            |--------|------|--------|
            | GET | `/health` | Health check |
            | POST | `/contacts` | Create contact |
            | GET | `/contacts` | List contacts |
            | GET | `/contacts/:id` | Get contact |
            | PUT | `/contacts/:id` | Update contact |
            | DELETE | `/contacts/:id` | Delete contact |

            The instance will be terminated automatically after ${{ steps.params.outputs.minutes }} min.
            Instance ID: `${{ steps.instance.outputs.id }}`

      - name: Wait for lifetime to expire
        env:
          DEPLOY_MINUTES: ${{ steps.params.outputs.minutes }}
        run: sleep $(( DEPLOY_MINUTES * 60 ))

      - name: Terminate spot instance
        if: always() && steps.instance.outputs.id != ''
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
        run: |
          aws ec2 terminate-instances --instance-ids "$INSTANCE_ID"
          aws ec2 wait instance-terminated --instance-ids "$INSTANCE_ID"

      - name: Delete ephemeral security group
        if: always() && steps.sg.outputs.id != ''
        env:
          SG_ID: ${{ steps.sg.outputs.id }}
        run: aws ec2 delete-security-group --group-id "$SG_ID"

      - name: Post teardown comment
        if: always() && steps.params.outputs.pr_number != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ steps.params.outputs.pr_number }}
          body: "EC2 Spot instance `${{ steps.instance.outputs.id }}` terminated. Session ended."
